name: Skill Pack CI

on:
  pull_request:
    paths:
      - 'skill-packs/community/**'
      - 'skill-packs/verified/**'

jobs:
  validate:
    name: Validate Skill Pack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed skill packs
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^skill-packs/(community|verified)/.+/SKILL\.md$' \
            || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed skill files: $CHANGED"

      - name: Validate SKILL.md files
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const changed = `${{ steps.changed.outputs.files }}`.trim().split('\n').filter(Boolean);

          if (changed.length === 0) {
            console.log('No SKILL.md files changed — skipping validation.');
            process.exit(0);
          }

          const REQUIRED_FIELDS = ['name', 'description', 'version', 'tier', 'category', 'author', 'license', 'min_plugin_version'];
          const VALID_CATEGORIES = ['copywriting', 'platform-mastery', 'fb-specific', 'cn-overseas'];
          const VALID_LICENSES = ['MIT', 'CC-BY-4.0'];
          const BLOCKED_KEYWORDS = ['buy now', 'click here to win', 'guaranteed income'];

          let errors = [];

          for (const file of changed) {
            console.log(`\nChecking: ${file}`);
            const content = fs.readFileSync(file, 'utf-8');
            const dirName = path.basename(path.dirname(file));

            // Extract frontmatter
            const fmMatch = content.match(/^---\n([\s\S]*?)\n---/);
            if (!fmMatch) {
              errors.push(`${file}: Missing YAML frontmatter block`);
              continue;
            }
            const fm = fmMatch[1];

            // Parse simple key: value pairs
            const fields = {};
            for (const line of fm.split('\n')) {
              const m = line.match(/^(\w+):\s*"?([^"]*)"?\s*$/);
              if (m) fields[m[1]] = m[2].trim();
            }

            // Required fields
            for (const f of REQUIRED_FIELDS) {
              if (!fields[f]) errors.push(`${file}: Missing required field '${f}'`);
            }

            // Name matches directory
            if (fields.name && fields.name !== dirName) {
              errors.push(`${file}: 'name' (${fields.name}) must match directory name (${dirName})`);
            }

            // Description length
            if (fields.description) {
              const len = fields.description.length;
              if (len < 10 || len > 200) {
                errors.push(`${file}: 'description' must be 10–200 chars (got ${len})`);
              }
            }

            // Content length (words)
            const body = content.replace(/^---[\s\S]*?---/, '').trim();
            const wordCount = body.split(/\s+/).filter(Boolean).length;
            if (wordCount < 50) {
              errors.push(`${file}: Content too short (${wordCount} words, minimum 50)`);
            }
            if (wordCount > 5000) {
              errors.push(`${file}: Content too long (${wordCount} words, maximum 5000)`);
            }

            // Valid category
            if (fields.category && !VALID_CATEGORIES.includes(fields.category)) {
              errors.push(`${file}: Invalid category '${fields.category}'. Must be one of: ${VALID_CATEGORIES.join(', ')}`);
            }

            // Valid license
            if (fields.license && !VALID_LICENSES.includes(fields.license)) {
              errors.push(`${file}: Invalid license '${fields.license}'. Must be: MIT or CC-BY-4.0`);
            }

            // Blocked keywords
            const lower = content.toLowerCase();
            for (const kw of BLOCKED_KEYWORDS) {
              if (lower.includes(kw)) {
                errors.push(`${file}: Contains blocked keyword: "${kw}"`);
              }
            }

            // Tier matches path
            const expectedTier = file.startsWith('skill-packs/community/') ? 'community' : 'verified';
            if (fields.tier && fields.tier !== expectedTier) {
              errors.push(`${file}: 'tier' (${fields.tier}) does not match path (expected ${expectedTier})`);
            }

            console.log(`  ✅ ${file} passed`);
          }

          if (errors.length > 0) {
            console.error('\n❌ Validation failed:\n');
            errors.forEach(e => console.error('  •', e));
            process.exit(1);
          }

          console.log('\n✅ All skill packs passed validation.');
          EOF

      - name: Post result comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ job.status }}';
            const body = outcome === 'success'
              ? '✅ **Skill Pack CI passed.** All format checks passed — this PR will be auto-merged.'
              : '❌ **Skill Pack CI failed.** Please fix the errors listed above and push a new commit. No human review needed once CI passes.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  auto-merge:
    name: Auto-merge community PRs
    needs: validate
    runs-on: ubuntu-latest
    if: |
      success() &&
      startsWith(github.head_ref, 'skill/') &&
      contains(github.event.pull_request.labels.*.name, 'community-skill')
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
            console.log('✅ Auto-merged community skill pack PR.');
